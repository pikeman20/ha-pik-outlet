<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PIK Outlet — Schedule Card UI Preview</title>
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   Theme tokens — matches Home Assistant dark mode
   ═══════════════════════════════════════════════════════════════════════════ */
:root {
  --bg: #111318;
  --card: #1c1f27;
  --card-border: #2a2e38;
  --surface: #252830;
  --surface-hover: #2e323b;
  --inner: #1a1d24;
  --text-1: #e1e3e6;
  --text-2: #8b8f96;
  --text-3: #555a63;
  --green: #4CAF50;
  --green-dim: rgba(76,175,80,0.4);
  --red: #EF5350;
  --red-dim: rgba(239,83,80,0.4);
  --blue: #42A5F5;
  --blue-dim: rgba(66,165,245,0.30);
  --track: #2a2e38;
}

* { box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: var(--text-1);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 16px;
}

/* ═══ Card shell ═══ */
.ha-card {
  background: var(--card);
  border-radius: 16px;
  padding: 20px;
  width: 100%; max-width: 380px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.45);
  border: 1px solid var(--card-border);
}

/* ═══ Badge ═══ */
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 6px;
  background: rgba(66,165,245,.12); color: var(--blue);
  font-size: 10px; font-weight: 700; letter-spacing: .8px;
  margin-bottom: 14px;
}

/* ═══ Header ═══ */
.header { display: flex; justify-content: space-between; align-items: center;
           margin-bottom: 14px; }
.title  { font-size: 15px; font-weight: 600; }
.profiles { display: flex; gap: 4px; }
.p-btn {
  width: 30px; height: 26px; border-radius: 8px;
  border: 1px solid var(--card-border);
  background: transparent; color: var(--text-2);
  font-size: 12px; font-weight: 500; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.p-btn:hover { background: var(--surface-hover); }
.p-btn.sel  { background: var(--blue); color: #fff; border-color: var(--blue); }

/* ═══ Toggle row ═══ */
.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; padding: 8px 12px;
  background: var(--surface); border-radius: 10px;
}
.toggle-label { font-size: 13px; color: var(--text-2); }
.tog {
  width: 44px; height: 24px; border-radius: 12px; border: none;
  background: var(--track); cursor: pointer; position: relative;
  transition: background .25s;
}
.tog.on { background: var(--blue); }
.tog::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 20px; height: 20px; border-radius: 50%; background: #fff;
  transition: transform .25s;
}
.tog.on::after { transform: translateX(20px); }

/* ═══ Clock SVG ═══ */
.clock-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
.clock-svg {
  width: 100%; max-width: 280px; aspect-ratio: 1;
  touch-action: none; user-select: none; -webkit-user-select: none;
}
.track-bg  { fill: none; stroke: var(--track); stroke-width: 26; }
.arc       { fill: none; stroke-width: 26; stroke-linecap: butt; }
.arc-green { stroke: var(--green); opacity: .45; }
.arc-blue  { stroke: var(--blue);  opacity: .30; }
.arc-red   { stroke: var(--red);   opacity: .45; }
/* highlight during drag */
.arc-green.glow { opacity: .60; }
.arc-blue.glow  { opacity: .40; }
.arc-red.glow   { opacity: .60; }

.h-label {
  fill: var(--text-2); font-size: 11px; font-weight: 500;
  text-anchor: middle; dominant-baseline: central; pointer-events: none;
}
.h-label.major { fill: var(--text-1); font-size: 13px; font-weight: 600; }
.tick-line { stroke: var(--text-3); }

.handle { cursor: grab; transition: r .15s; }
.handle:active { cursor: grabbing; }
.handle.big { r: 14; }
.hit-area { fill: transparent; cursor: grab; pointer-events: all; }

.c-dur { fill: var(--text-1); font-size: 22px; font-weight: 700;
         text-anchor: middle; pointer-events: none; }
.c-sub { fill: var(--text-2); font-size: 11px; text-anchor: middle;
         pointer-events: none; }

/* ═══ Time inputs ═══ */
.time-row { display: flex; justify-content: center; gap: 16px; margin-bottom: 16px; }
.t-group {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; background: var(--surface); border-radius: 12px;
  border: 1.5px solid transparent; transition: border-color .2s;
}
.t-group.on-g  { border-color: var(--green-dim); }
.t-group.off-g { border-color: var(--red-dim); }
.t-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.t-dot.gn { background: var(--green); }
.t-dot.rd { background: var(--red); }
.t-in {
  width: 36px; height: 36px; border: 1px solid var(--card-border);
  border-radius: 8px; background: var(--inner); color: var(--text-1);
  font-size: 17px; font-weight: 600; text-align: center; outline: none;
  font-family: 'SF Mono','Menlo','Cascadia Code','Consolas',monospace;
}
.t-in:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(66,165,245,.2); }
.t-sep { font-size: 20px; font-weight: 700; color: var(--text-3); margin: 0 1px; }

/* ═══ Day selector ═══ */
.days { display: flex; justify-content: center; gap: 6px; margin-bottom: 18px; }
.d-btn {
  width: 40px; height: 38px; border-radius: 10px;
  border: 1px solid var(--card-border);
  background: transparent; color: var(--text-2);
  font-size: 11px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  text-transform: uppercase; letter-spacing: .5px; transition: all .2s;
}
.d-btn:hover { background: var(--surface-hover); }
.d-btn.sel {
  background: var(--blue); color: #fff; border-color: var(--blue);
  box-shadow: 0 2px 8px rgba(66,165,245,.25);
}

/* ═══ Apply button ═══ */
.apply {
  width: 100%; height: 44px; border-radius: 12px; border: none;
  background: var(--blue); color: #fff; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .2s; letter-spacing: .3px;
}
.apply:hover { background: #1E88E5; box-shadow: 0 4px 16px rgba(66,165,245,.3); }
.apply:active { transform: scale(.98); }

.footnote {
  text-align: center; font-size: 11px; color: var(--text-3); margin-top: 10px;
  line-height: 1.5;
}
</style>
</head>
<body>

<div class="ha-card">
  <div class="badge">DESIGN PREVIEW — Interactive Prototype</div>

  <!-- ── Header ──────────────────────────────────── -->
  <div class="header">
    <div class="title" id="cardTitle">Socket 1 — Schedule</div>
    <div class="profiles" id="profiles"></div>
  </div>

  <!-- ── Enable toggle ───────────────────────────── -->
  <div class="toggle-row">
    <span class="toggle-label" id="togLabel">Profile 1 Enabled</span>
    <button class="tog on" id="tog"></button>
  </div>

  <!-- ── 24-hour circular clock ──────────────────── -->
  <div class="clock-wrap">
    <svg class="clock-svg" id="svg" viewBox="0 0 300 300">
      <defs>
        <filter id="fG" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="3.5"/>
          <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="fR" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="3.5"/>
          <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <radialGradient id="cFill">
          <stop offset="0%" stop-color="#1e2128"/>
          <stop offset="100%" stop-color="#1a1d24"/>
        </radialGradient>
      </defs>

      <!-- inner disc -->
      <circle cx="150" cy="150" r="94" fill="url(#cFill)"/>

      <!-- background track ring -->
      <circle class="track-bg" cx="150" cy="150" r="120"/>

      <!-- colored arcs (updated by JS) -->
      <path id="arcR" class="arc arc-red"/>
      <path id="arcG" class="arc arc-green"/>

      <!-- tick marks & hour labels (built by JS) -->
      <g id="markers"></g>

      <!-- OFF handle (rendered first → behind ON) -->
      <circle id="hitOff" class="hit-area" r="24"/>
      <circle id="hOff" class="handle" r="12"
              fill="var(--red)" stroke="#fff" stroke-width="2.5"
              filter="url(#fR)"/>

      <!-- ON handle (on top) -->
      <circle id="hitOn" class="hit-area" r="24"/>
      <circle id="hOn" class="handle" r="12"
              fill="var(--green)" stroke="#fff" stroke-width="2.5"
              filter="url(#fG)"/>

      <!-- center label -->
      <text id="durTxt" class="c-dur" x="150" y="145"></text>
      <text class="c-sub" x="150" y="165">ON duration</text>
    </svg>
  </div>

  <!-- ── Time input boxes ────────────────────────── -->
  <div class="time-row">
    <div class="t-group on-g">
      <div class="t-dot gn"></div>
      <input class="t-in" id="iOH" maxlength="2" inputmode="numeric" pattern="[0-9]*">
      <span class="t-sep">:</span>
      <input class="t-in" id="iOM" maxlength="2" inputmode="numeric" pattern="[0-9]*">
    </div>
    <div class="t-group off-g">
      <div class="t-dot rd"></div>
      <input class="t-in" id="iFH" maxlength="2" inputmode="numeric" pattern="[0-9]*">
      <span class="t-sep">:</span>
      <input class="t-in" id="iFM" maxlength="2" inputmode="numeric" pattern="[0-9]*">
    </div>
  </div>

  <!-- ── Day-of-week selector ────────────────────── -->
  <div class="days" id="days"></div>

  <!-- ── Apply ───────────────────────────────────── -->
  <button class="apply" id="applyBtn">Apply Schedule</button>

  <div class="footnote">
    Drag green/red handles on the clock · 5-min snap<br>
    Or type exact values in the boxes below
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     JavaScript — interactive prototype logic
     ═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function () {
'use strict';

/* ── Constants ─────────────────────────────────────────────────────────── */
const CX = 150, CY = 150, R = 120;  // SVG viewBox center & track radius
const SNAP = 5;                       // minute snap for drag
const SVG_NS = 'http://www.w3.org/2000/svg';
const LBL_R = 86;                     // radius for hour number labels
const TICK_INNER = 99;                // tick mark inner radius
const TICK_OUTER = 106;               // tick mark outer radius

/* ── State ─────────────────────────────────────────────────────────────── */
let onMin  = 7 * 60 + 30;   // 07:30  (minutes from midnight)
let offMin = 22 * 60;        // 22:00
let days   = 0b0111110;      // Mon–Fri = 62
let prof   = 1;
let enabled = true;
let drag   = null;           // 'on' | 'off' | null

/* ── DOM shorthand ─────────────────────────────────────────────────────── */
const $ = id => document.getElementById(id);

/* ── Polar math ────────────────────────────────────────────────────────── */
function p2c(angleDeg, r) {
  r = r || R;
  const rad = (angleDeg - 90) * Math.PI / 180;
  return [CX + r * Math.cos(rad), CY + r * Math.sin(rad)];
}
function min2angle(m) { return (m / 1440) * 360; }
function angle2min(a) {
  a = ((a % 360) + 360) % 360;
  let m = Math.round(a / 360 * 1440);
  m = Math.round(m / SNAP) * SNAP;
  return m >= 1440 ? 0 : m;
}
function pad2(n) { return String(n).padStart(2, '0'); }

/* ── SVG arc path builder ──────────────────────────────────────────────── */
function arcPath(sa, ea) {
  const d = ea - sa;
  if (d <= 0.1) return '';
  // Near-full circle → split into two half-arcs to avoid SVG rendering bug
  if (d >= 359.5) {
    const mid = sa + 179.9;
    const [sx,sy] = p2c(sa), [mx,my] = p2c(mid), [ex,ey] = p2c(ea);
    return `M${sx} ${sy}A${R} ${R} 0 0 1 ${mx} ${my}A${R} ${R} 0 0 1 ${ex} ${ey}`;
  }
  const [sx,sy] = p2c(sa), [ex,ey] = p2c(ea);
  const lg = d > 180 ? 1 : 0;
  return `M${sx} ${sy}A${R} ${R} 0 ${lg} 1 ${ex} ${ey}`;
}

/* ── Build static UI elements ──────────────────────────────────────────── */
function buildMarkers() {
  const g = $('markers');
  for (let h = 0; h < 24; h++) {
    const a = (h / 24) * 360;
    const rad = (a - 90) * Math.PI / 180;
    const isMaj = (h % 6 === 0);
    const isLbl = (h % 3 === 0);

    // tick line
    const len = isLbl ? (TICK_OUTER - TICK_INNER + 2) : (TICK_OUTER - TICK_INNER - 1);
    const r1 = isLbl ? TICK_INNER - 2 : TICK_INNER + 1;
    const r2 = r1 + len;
    const ln = document.createElementNS(SVG_NS, 'line');
    ln.setAttribute('x1', CX + r1 * Math.cos(rad));
    ln.setAttribute('y1', CY + r1 * Math.sin(rad));
    ln.setAttribute('x2', CX + r2 * Math.cos(rad));
    ln.setAttribute('y2', CY + r2 * Math.sin(rad));
    ln.setAttribute('class', 'tick-line');
    ln.style.strokeWidth = isLbl ? '1.5' : '0.7';
    g.appendChild(ln);

    // label (every 3 hours)
    if (isLbl) {
      const [lx, ly] = p2c(a, LBL_R);
      const t = document.createElementNS(SVG_NS, 'text');
      t.setAttribute('x', lx);
      t.setAttribute('y', ly);
      t.setAttribute('class', 'h-label' + (isMaj ? ' major' : ''));
      t.textContent = String(h);
      g.appendChild(t);
    }
  }
}

function buildProfiles() {
  const c = $('profiles');
  for (let i = 1; i <= 6; i++) {
    const b = document.createElement('button');
    b.className = 'p-btn' + (i === prof ? ' sel' : '');
    b.textContent = i;
    b.addEventListener('click', () => {
      prof = i;
      c.querySelectorAll('.p-btn').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel');
      $('togLabel').textContent = `Profile ${i} Enabled`;
    });
    c.appendChild(b);
  }
}

/*  Day buttons — firmware bitmask: bit0=Sun, bit1=Mon … bit6=Sat
    Display order: Mon Tue Wed Thu Fri Sat Sun                      */
const DAY_CONF = [
  { lbl: 'Mon', bit: 1 }, { lbl: 'Tue', bit: 2 }, { lbl: 'Wed', bit: 3 },
  { lbl: 'Thu', bit: 4 }, { lbl: 'Fri', bit: 5 }, { lbl: 'Sat', bit: 6 },
  { lbl: 'Sun', bit: 0 },
];
function buildDays() {
  const c = $('days');
  DAY_CONF.forEach(d => {
    const b = document.createElement('button');
    b.className = 'd-btn' + ((days & (1 << d.bit)) ? ' sel' : '');
    b.textContent = d.lbl;
    b.addEventListener('click', () => {
      days ^= (1 << d.bit);
      b.classList.toggle('sel');
      updateBitmaskDebug();
    });
    c.appendChild(b);
  });
}

function updateBitmaskDebug() {
  // Update footnote with bitmask info (useful for dev preview)
  const bits = '0b' + days.toString(2).padStart(7, '0');
  $('applyBtn').textContent = `Apply Schedule  (days=${days}, ${bits})`;
}

/* ── Render / update ───────────────────────────────────────────────────── */
function render() {
  const oa = min2angle(onMin);
  const fa = min2angle(offMin);

  // Arcs: green = ON→OFF (device on), red = OFF→ON (device off, wraps via midnight)
  $('arcG').setAttribute('d', offMin > onMin ? arcPath(oa, fa) : '');
  // Red covers the rest: 0→ON + OFF→end
  const redParts = [];
  if (onMin > 0)       redParts.push(arcPath(0, oa));
  if (offMin < 1440)   redParts.push(arcPath(fa, 359.9));
  $('arcR').setAttribute('d', redParts.join(' '));

  // Drag glow
  const gl = !!drag;
  $('arcG').classList.toggle('glow', gl);
  $('arcR').classList.toggle('glow', gl);

  // Handle positions
  setHandle('hOn',  'hitOn',  ...p2c(oa));
  setHandle('hOff', 'hitOff', ...p2c(fa));

  // Handle size feedback during drag
  $('hOn').classList.toggle('big', drag === 'on');
  $('hOff').classList.toggle('big', drag === 'off');

  // Time input boxes
  $('iOH').value = pad2(Math.floor(onMin / 60));
  $('iOM').value = pad2(onMin % 60);
  $('iFH').value = pad2(Math.floor(offMin / 60));
  $('iFM').value = pad2(offMin % 60);

  // Center duration
  const dm = offMin - onMin;
  const dh = Math.floor(dm / 60), dmm = dm % 60;
  $('durTxt').textContent = dh + 'h' + (dmm ? ' ' + dmm + 'm' : '');
}

function setHandle(vis, hit, x, y) {
  [vis, hit].forEach(id => {
    $(id).setAttribute('cx', x);
    $(id).setAttribute('cy', y);
  });
}

/* ── Drag interaction ──────────────────────────────────────────────────── */
function getAngle(e) {
  const svg = $('svg');
  const rect = svg.getBoundingClientRect();
  const sx = 300 / rect.width, sy = 300 / rect.height;
  const cx = (e.touches ? e.touches[0].clientX : e.clientX);
  const cy = (e.touches ? e.touches[0].clientY : e.clientY);
  const dx = (cx - rect.left) * sx - CX;
  const dy = (cy - rect.top)  * sy - CY;
  let a = Math.atan2(dx, -dy) * 180 / Math.PI;
  return a < 0 ? a + 360 : a;
}

function onMove(e) {
  if (!drag) return;
  e.preventDefault();
  const m = angle2min(getAngle(e));
  if (drag === 'on') {
    onMin = Math.max(0, Math.min(m, offMin - SNAP));
  } else {
    offMin = Math.max(onMin + SNAP, Math.min(m, 1440 - SNAP));
  }
  render();
}

function onUp() {
  drag = null;
  document.removeEventListener('mousemove', onMove);
  document.removeEventListener('mouseup',   onUp);
  document.removeEventListener('touchmove', onMove);
  document.removeEventListener('touchend',  onUp);
  render();
}

function startDrag(which) {
  return function (e) {
    e.preventDefault();
    drag = which;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend',  onUp);
    render();
  };
}

/* ── Input field handlers ──────────────────────────────────────────────── */
function syncInputs() {
  let oh = parseInt($('iOH').value) || 0;
  let om = parseInt($('iOM').value) || 0;
  let fh = parseInt($('iFH').value) || 0;
  let fm = parseInt($('iFM').value) || 0;

  oh = Math.max(0, Math.min(23, oh));
  om = Math.max(0, Math.min(59, om));
  fh = Math.max(0, Math.min(23, fh));
  fm = Math.max(0, Math.min(59, fm));

  let newOn  = oh * 60 + om;
  let newOff = fh * 60 + fm;

  // Enforce ON < OFF
  if (newOff <= newOn) newOff = Math.min(newOn + SNAP, 1435);
  onMin  = newOn;
  offMin = newOff;
  render();
}

/* ── Keyboard support on inputs (arrow up/down) ───────────────────────── */
function inputKeyHandler(id, min, max, step) {
  $(id).addEventListener('keydown', function (e) {
    if (e.key === 'ArrowUp')   { e.preventDefault(); this.value = pad2(Math.min(max, (parseInt(this.value)||0) + step)); syncInputs(); }
    if (e.key === 'ArrowDown') { e.preventDefault(); this.value = pad2(Math.max(min, (parseInt(this.value)||0) - step)); syncInputs(); }
  });
}

/* ── Initialise ────────────────────────────────────────────────────────── */
function init() {
  buildMarkers();
  buildProfiles();
  buildDays();
  updateBitmaskDebug();

  // Drag events on handles
  ['hOn', 'hitOn'].forEach(id => {
    $(id).addEventListener('mousedown',  startDrag('on'));
    $(id).addEventListener('touchstart', startDrag('on'), { passive: false });
  });
  ['hOff', 'hitOff'].forEach(id => {
    $(id).addEventListener('mousedown',  startDrag('off'));
    $(id).addEventListener('touchstart', startDrag('off'), { passive: false });
  });

  // Input change/blur
  ['iOH','iOM','iFH','iFM'].forEach(id => {
    $(id).addEventListener('change', syncInputs);
    $(id).addEventListener('blur',   syncInputs);
  });

  // Arrow key support
  inputKeyHandler('iOH', 0, 23, 1);
  inputKeyHandler('iOM', 0, 59, 5);
  inputKeyHandler('iFH', 0, 23, 1);
  inputKeyHandler('iFM', 0, 59, 5);

  // Toggle
  $('tog').addEventListener('click', () => {
    enabled = !enabled;
    $('tog').classList.toggle('on', enabled);
  });

  // Apply button demo
  $('applyBtn').addEventListener('click', () => {
    const oh = Math.floor(onMin/60), om = onMin%60;
    const fh = Math.floor(offMin/60), fm = offMin%60;
    const bits = '0b' + days.toString(2).padStart(7, '0');
    alert(
      `TIMER_SET command preview:\n\n` +
      `Socket: 1  Profile: ${prof}\n` +
      `Days bitmask: ${days} (${bits})\n` +
      `ON:  ${pad2(oh)}:${pad2(om)}\n` +
      `OFF: ${pad2(fh)}:${pad2(fm)}\n` +
      `Enabled: ${enabled}\n\n` +
      `→ PIK-CMD:TIMER_SET:1:${prof}:${days}:${oh}:${om}:${fh}:${fm}:${enabled?1:0}`
    );
  });

  render();
}

document.addEventListener('DOMContentLoaded', init);
})();
</script>

</body>
</html>

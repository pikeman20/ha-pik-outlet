name: Auto Release

on:
  push:
    branches: [main, master]
    paths:
      - "custom_components/pik_outlet/manifest.json"
      - "custom_components/pik_outlet/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Auto Tag & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Need full history to check existing tags

      - name: Read version from manifest.json
        id: version
        run: |
          VER=$(python3 -c "import json; print(json.load(open('custom_components/pik_outlet/manifest.json'))['version'])")
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VER"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Tag ${{ steps.version.outputs.tag }} already exists — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 Tag ${{ steps.version.outputs.tag }} does not exist — will create release"
          fi

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create zip for release
        if: steps.check.outputs.exists == 'false'
        run: |
          cd custom_components/pik_outlet
          zip -r ../../pik_outlet.zip . -x '*.pyc' '__pycache__/*'
          cd ../..

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## PIK BLE 6-Switch Outlet v${{ steps.version.outputs.version }}

            ### Installation / Update
            - **HACS**: Update notification will appear automatically
            - **Manual**: Download `pik_outlet.zip`, extract to `config/custom_components/pik_outlet/`

            After updating, restart Home Assistant.
          files: pik_outlet.zip
          draft: false
          prerelease: false
          generate_release_notes: true
